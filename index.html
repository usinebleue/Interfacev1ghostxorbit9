
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Interface V1 GhostX + Orbit9</title>
    </head>

    <body>
      <div id="root">
        <div id="pre-load" style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif">
          <p style="color:#999">Chargement CarlOS...</p>
        </div>
      </div>
      <script>
        // Debug: log toutes les erreurs AVANT React
        window.onerror = function(msg, src, line, col, err) {
          document.getElementById('pre-load').innerHTML =
            '<div style="text-align:left;max-width:600px;padding:20px">' +
            '<h2 style="color:red">JS Error</h2>' +
            '<p><b>Message:</b> ' + msg + '</p>' +
            '<p><b>Source:</b> ' + src + '</p>' +
            '<p><b>Line:</b> ' + line + ':' + col + '</p>' +
            '<button onclick="localStorage.clear();location.reload()" style="margin-top:10px;padding:8px 16px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer">Reset</button>' +
            '</div>';
          return true;
        };
        window.onunhandledrejection = function(e) {
          document.getElementById('pre-load').innerHTML =
            '<div style="text-align:left;max-width:600px;padding:20px">' +
            '<h2 style="color:red">Promise Error</h2>' +
            '<p>' + String(e.reason) + '</p>' +
            '<button onclick="localStorage.clear();location.reload()" style="margin-top:10px;padding:8px 16px;background:#2563eb;color:white;border:none;border-radius:8px;cursor:pointer">Reset</button>' +
            '</div>';
        };
      </script>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
